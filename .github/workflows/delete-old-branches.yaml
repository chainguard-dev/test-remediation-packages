name: Delete old branches

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions: {}

jobs:
  cleanup_old_branches:
    runs-on: ubuntu-latest

    if: github.repository == 'chainguard-dev/test-remediation-packages'

    permissions:
      id-token: write # To gitsign and federate
      contents: read

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: octo-sts/action@f603d3be9d8dd9871a265776e625a27b00effe05 # v1.1.1
        id: octo-sts
        with:
          scope: ${{ github.repository }}
          identity: delete-branches

      # this need to point to main to always get the latest action
      - uses: wolfi-dev/actions/install-wolfictl@79aeedc9c074a56063f8796aa6b99c55d6ee0b89 # main

      - name: Delete Branches
        run: |
          wolfictl gh gc branch https://github.com/chainguard-dev/test-remediation-packages --match "ai-cve-remedy"
        env:
          GITHUB_TOKEN: ${{ steps.octo-sts.outputs.token }}
